version: 2

models:
  - name: mart_dashboard_daily_city_trends
    description: Dashboard-ready daily city trends by pollutant.
    columns:
      - name: measurement_date
        tests:
          - not_null
      - name: location_name
        tests:
          - not_null
      - name: pollutant
        tests:
          - not_null
      - name: avg_pollution_value
        tests:
          - not_null
