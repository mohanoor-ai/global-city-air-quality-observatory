version: 2

models:
  - name: mart_city_pollution_trends
    description: Daily city and pollutant trend table used for the temporal dashboard tile.
    columns:
      - name: measurement_date
        tests:
          - not_null
      - name: city
        tests:
          - not_null
      - name: pollutant
        tests:
          - not_null

  - name: mart_city_pollutant_distribution
    description: Average and percentile pollutant profile per city for the categorical dashboard tile.
    columns:
      - name: city
        tests:
          - not_null
      - name: pollutant
        tests:
          - not_null

  - name: mart_city_extreme_events
    description: Top 10 highest readings per city and pollutant for anomaly review.
    columns:
      - name: measurement_datetime
        tests:
          - not_null
      - name: city
        tests:
          - not_null
      - name: pollutant
        tests:
          - not_null

  - name: mart_city_comparison_summary
    description: One-row-per-city scorecard with average pollutant levels and latest coverage date.
    columns:
      - name: city
        tests:
          - not_null
      - name: avg_pm25
        tests:
          - not_null

  - name: mart_pm25_city_daily
    description: Daily PM2.5 trend table that feeds the main line chart.
    columns:
      - name: measurement_date
        tests:
          - not_null
      - name: city
        tests:
          - not_null
      - name: avg_pm25
        tests:
          - not_null
