version: 2

sources:
  - name: warehouse
    database: "{{ env_var('PROJECT_ID', 'your-gcp-project-id') }}"
    schema: air_quality_dw
    tables:
      - name: fct_air_quality_measurements
        description: Spark-standardized Silver measurements loaded into the warehouse fact table.
      - name: dim_city
        description: One row per selected city in the analytical scope.
      - name: dim_pollutant
        description: One row per standardized pollutant.
