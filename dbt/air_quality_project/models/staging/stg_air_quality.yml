version: 2

models:
  - name: stg_air_quality
    description: Standardized staging model for warehouse air quality data.
    columns:
      - name: measurement_datetime
        tests:
          - not_null
      - name: location_name
        tests:
          - not_null
      - name: pollutant
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['pm25', 'pm10', 'no2', 'co', 'o3']
      - name: value
        tests:
          - not_null
