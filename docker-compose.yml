x-airflow-common:
  &airflow-common
  image: ${AIRFLOW_IMAGE_NAME:-global-city-air-quality-observatory-airflow:local}
  build:
    context: .
    dockerfile: airflow/Dockerfile
  env_file:
    - ${ENV_FILE_PATH:-.env}
  environment:
    &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: CeleryExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://airflow:airflow@postgres/airflow
    AIRFLOW__CELERY__BROKER_URL: redis://:@redis:6379/0
    AIRFLOW__CORE__FERNET_KEY: ''
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__CORE__EXECUTION_API_SERVER_URL: 'http://airflow-apiserver:8080/execution/'
    AIRFLOW__API_AUTH__JWT_SECRET: ${AIRFLOW__API_AUTH__JWT_SECRET:-airflow_jwt_secret}
    AIRFLOW__API_AUTH__JWT_ISSUER: ${AIRFLOW__API_AUTH__JWT_ISSUER:-airflow}
    GCP_PROJECT_ID: ${GCP_PROJECT_ID}
    GCS_BUCKET_NAME: ${GCS_BUCKET_NAME}
    BIGQUERY_DATASET_ID: ${BIGQUERY_DATASET_ID}
    PROJECT_ID: ${GCP_PROJECT_ID}
    GCS_BUCKET: ${GCS_BUCKET_NAME}
    BIGQUERY_DATASET: ${BIGQUERY_DATASET_ID}
    GOOGLE_APPLICATION_CREDENTIALS: /opt/airflow/config/gcp-key.json
    PIPELINE_PROJECT_ROOT: /opt/airflow/project
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: 'true'
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/logs:/opt/airflow/logs
    - airflow-config-volume:/opt/airflow/config
    - ./:/opt/airflow/project
    - ./data:/opt/airflow/data
    - ${GOOGLE_APPLICATION_CREDENTIALS}:/opt/airflow/gcp-key-source.json:ro
  user: "50000:0"
  depends_on:
    &airflow-common-depends-on
    redis:
      condition: service_healthy
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      start_period: 5s
    restart: always

  redis:
    image: redis:7.2-bookworm
    expose:
      - 6379
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 30s
      retries: 50
      start_period: 30s
    restart: always

  airflow-apiserver:
    <<: *airflow-common
    entrypoint: /opt/airflow/.local/bin/airflow
    command:
      - api-server
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/api/v2/monitor/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    entrypoint: /opt/airflow/.local/bin/airflow
    command:
      - scheduler
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8974/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-dag-processor:
    <<: *airflow-common
    entrypoint: /opt/airflow/.local/bin/airflow
    command:
      - dag-processor
    healthcheck:
      test: ["CMD-SHELL", '/opt/airflow/.local/bin/airflow jobs check --job-type DagProcessorJob --hostname "$${HOSTNAME}"']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-worker:
    <<: *airflow-common
    entrypoint: /opt/airflow/.local/bin/airflow
    command:
      - celery
      - worker
    healthcheck:
      test: ["CMD-SHELL", '/opt/airflow/.local/bin/celery --app airflow.providers.celery.executors.celery_executor.app inspect ping -d "celery@$${HOSTNAME}" || /opt/airflow/.local/bin/celery --app airflow.executors.celery_executor.app inspect ping -d "celery@$${HOSTNAME}"']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-apiserver:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

  airflow-triggerer:
    <<: *airflow-common
    entrypoint: /opt/airflow/.local/bin/airflow
    command:
      - triggerer
    healthcheck:
      test: ["CMD-SHELL", '/opt/airflow/.local/bin/airflow jobs check --job-type TriggererJob --hostname "$${HOSTNAME}"']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        set -euo pipefail
        mkdir -p /opt/airflow/logs
        mkdir -p /opt/airflow/config
        mkdir -p /opt/airflow/data/{bronze,silver,quality}
        mkdir -p /opt/airflow/project/dbt/air_quality_project/{target,logs}
        if [[ -f /opt/airflow/gcp-key-source.json ]]; then
          cp /opt/airflow/gcp-key-source.json /opt/airflow/config/gcp-key.json
          chmod 644 /opt/airflow/config/gcp-key.json
        fi
        PYTHONPATH=/opt/airflow/.local/lib/python3.12/site-packages \
          python -m airflow db migrate
        chown -R 50000:0 /opt/airflow/logs
        chown -R 50000:0 /opt/airflow/data
        chown -R 50000:0 /opt/airflow/project/dbt/air_quality_project/{target,logs}
    user: "0:0"

volumes:
  airflow-config-volume:
  postgres-db-volume:
